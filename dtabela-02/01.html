<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        td{
            border: 1px solid black;
            padding: 10px;
            
        }

        th{
            border: 1px solid black;
            padding: 10px;
            color: white;
        }

        thead{
            background-color: gray;
            border: 1px solid black;
        }
        
        table{
            border-collapse: collapse;
            text-align: center;
            margin: 0 auto;
        }

        strong{
            vertical-align: middle;
        }

    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Áreas</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="4"><strong>Exatas</strong></td>
                <td>Matemática</td>
                <td>00</td>
                <td>00</td>
                <td>00</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>00</td>
                <td>00</td>
                <td>00</td>
            </tr>
            <tr>
                <td>Quimica</td>
                <td>00</td>
                <td>00</td>
                <td>00</td>
            </tr>
            <tr>
                <td>Programação</td>
                <td>00</td>
                <td>00</td>
                <td>00</td>
            </tr>
            <tr style="background-color: gray;">
                <th colspan="4" scope="row">Média de exatas</th>
                <td><strong style="color: white;">00</strong></td>
            </tr>
            <tr>
                <td rowspan="2"><strong>Humanas</strong></td>
                <td>Geografia</td>
                <td>00</td>
                <td>00</td>
                <td>00</td>
            </tr>
            <tr>
                <td>História</td>
                <td>00</td>
                <td>00</td>
                <td>00</td>
            </tr>
            <tr style="background-color: gray;">
                <th colspan="4" scope="row">Média de humanas</th>
                <td><strong style="color: white;">00</strong></td>

            </tr>
        </tbody>
    </table>
</body>
</html>
