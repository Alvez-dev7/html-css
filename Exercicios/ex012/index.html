<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video está hospedado no meu próprio servidor</p>
    <video width="560" poster = "imagens/capa.jpg" controls>
        <source src="midias/Video01.mp4.mp4" type="video/mp4">
        <source src="midias/Video01.webm.webm" type="video/webm">
        <source src="midias/Video01.ogv.ogv" type="video/ogv">
        <source src = "midias/Video01.mkv.mkv" type = "video/mkv">
        <p>Seu navegador não tem compatibilidade com reprodução de videos, <br> se quiser fazer o dowload do video, clique <a href="midias/Video01.mp4.mp4">aqui</a></p>
    </video>
    <h1>Utilizando videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/ErMSHiQRnc8?si=1jwmt3JMmbC_7W-1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
