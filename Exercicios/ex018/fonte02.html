<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:marcasa ;
            src: url(fonts/Makcasa-Regularot.otf) format('opentype'), url(fonts/Makcasa-Regulartt.ttf) format('truetype');
        }
            /*
                TIPOS DE FORMAT:
                MAIS USADOS:
                Opentype(OTF)
                Truetype(TTF)
            */

        h1{
            font-family: marcasa, serif;
            font-size: 2em;
            font-weight: bold;
        }

        p{
            font-family: marcasa, serif;
            font-weight: bold;
            
        }


    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempore, sit? Iusto architecto accusamus eum perferendis aliquid doloribus aliquam, nostrum beatae! Quos nesciunt libero, neque excepturi animi dolor? Alias, sit veniam?</p>
</body>
</html>
