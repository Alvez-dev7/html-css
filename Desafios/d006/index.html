<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 06</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5 podemos inserir os elementos da lista a seguir, passe o mouse sobre os termos <br> para descobrir qual tag é para ser usada</p>
    <br>
    <ul>
        <li><abbr title="Use a tag &lt; p &gt;">Parágrafos</abbr></li>
        <li><abbr title="Dependendo do titulo vc pode usar a hierarquia: &lt; h1 &gt;, &lt; h2 &gt;, &lt; h3 &gt;, ... ">Titulos</abbr></li>
        <li><abbr title="Use a tag &lt; img &gt;">Imagens</abbr></li>
        <li><abbr title="Use a tag &lt; abbr &gt;">Abreviações</abbr></li>
        <li><abbr title="Use a tag &lt; code &gt;, se quiser deixar tudo identado, use &lt; prev &gt;">Códigos-fonte</abbr></li>
        <li><abbr title="Use a tag &lt; ol &gt; para a criação, e a tag &lt; li &gt;, para itens">Listas numeradas</abbr></li>
        <li><abbr title="Use a tag &lt; ul &gt; para a criação, e a tag &lt; li &gt;, para itens">Listas com demarcadores</abbr></li>


    </ul>
</body>
</html>
