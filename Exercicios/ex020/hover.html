<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover no CSS</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p{
            display: none;
        }
        div:hover > p{
            display: block;
            color: white;
            background-color: red;
            width: 280px;
        }
        div{
            background-color: bisque;
            width: 250px;
        }

    </style>

</head>
<body>
    <p>Passe o mouse abaixo</p>
    <div>
        passe o mouse aqui
        <p>Texto escondido...</p>
    </div>
</body>
</html>
